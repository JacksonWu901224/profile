<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../css/crypto.css">
    <link rel="icon" href="../photo/btc.png" type="image/png">
    <link rel="apple-touch-icon" href="../photo/btc.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cryptocurrency</title>
</head>

<body>

<header>
    <h1>Crypto Price</h1>
</header>

<!-- 表頭 -->
<section>
    <div>Spot</div>
    <div>Last Price</div>
    <div>24h %</div>
</section>

<!-- BTC -->
<div class="image-container1">
    <a href="https://bitcoin.org">
        <img src="../photo/btc.png" alt="btc">
    </a>

    <div class="coin-name">BTC</div>
    <div id="btc-price">Loading...</div>
    <div id="btc-change">Loading...</div>
</div>

<!-- ETH -->
<div class="image-container2">
    <a href="https://ethereum.org/">
        <img src="../photo/eth.png" alt="eth">
    </a>

    <div class="coin-name">ETH</div>
    <div id="eth-price">Loading...</div>
    <div id="eth-change">Loading...</div>
</div>

<!-- ADA -->
<div class="image-container2">
    <a href="https://cardano.org/">
        <img src="../photo/cardano.png" alt="ada">
    </a>

    <div class="coin-name">ADA</div>
    <div id="ada-price">Loading...</div>
    <div id="ada-change">Loading...</div>
</div>

<!-- SNEK -->
<div class="image-container2">
    <a href="https://www.snek.com/">
        <img src="../photo/snek.jpg" alt="snek">
    </a>

    <div class="coin-name">SNEK</div>
    <div id="snek-price">Loading...</div>
    <div id="snek-change">Loading...</div>
</div>

<script src="../javascript/crypto.js"></script>

</body>
</html>
